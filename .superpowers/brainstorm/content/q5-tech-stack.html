<h2>技术栈</h2>
<p class="subtitle">浏览器插件的开发框架</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>原生 HTML/JS + Milkdown（推荐）</h3>
      <p>最轻量。新 Tab 页面就是一个 HTML 文件，直接引入 Milkdown。无框架依赖，打包体积小，加载快。用 Vite 构建。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Vue 3 + Milkdown</h3>
      <p>Milkdown 官方有 Vue 集成（@milkdown/vue）。方便做组件化开发，后续扩展更灵活。稍重一点。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>React + Milkdown</h3>
      <p>Milkdown 官方有 React 集成（@milkdown/react）。React 生态丰富，适合习惯 React 的开发者。</p>
    </div>
  </div>
</div>
