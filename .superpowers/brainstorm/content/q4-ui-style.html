<h2>界面风格</h2>
<p class="subtitle">打开新 Tab 后，编辑器的整体外观</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>极简纯净（推荐）</h3>
      <p>像 Typora 一样，打开就是一张白纸，没有多余 UI。工具栏隐藏或极小化，专注写作。顶部可能只有一个标题输入。</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>带顶部工具栏</h3>
      <p>顶部有常用格式按钮（加粗、标题、列表、链接等），方便不熟悉 Markdown 语法的用户。类似 Notion 的编辑器。</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>浮动工具栏</h3>
      <p>选中文字时弹出格式工具栏（Bubble Menu），平时完全隐藏。兼顾简洁和易用。</p>
    </div>
  </div>
</div>
