name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: .output/*-chrome.zip
          generate_release_notes: true
